<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Estadísticas del Evento</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet"/>
  <style>:root{--primary:#1a237e}.navbar{background:var(--primary)!important}.chart-container{position:relative;height:280px}</style>
</head>
<body class="bg-light">
<nav class="navbar navbar-dark px-4 py-3">
  <a class="navbar-brand fw-bold" href="/dashboard.html"><i class="bi bi-mortarboard-fill me-2"></i>Eventos PUCMM</a>
  <div class="d-flex gap-2"><a href="/dashboard.html" class="btn btn-outline-light btn-sm"><i class="bi bi-arrow-left me-1"></i>Dashboard</a><button class="btn btn-outline-light btn-sm" onclick="logout()">Salir</button></div>
</nav>
<div class="container my-5">
  <div id="loading" class="text-center py-5"><div class="spinner-border text-primary" style="width:3rem;height:3rem"></div><p class="mt-3 text-muted">Cargando estadísticas...</p></div>
  <div id="content" class="d-none">
    <h2 class="fw-bold" id="evTitle"></h2>
    <p class="text-muted" id="evMeta"></p>
    <div class="row g-3 mb-4">
      <div class="col-6 col-md-3"><div class="card shadow-sm text-center p-3 border-0 rounded-3"><i class="bi bi-people text-primary fs-2"></i><h3 class="fw-bold mt-2" id="sR">-</h3><small class="text-muted">Total Inscritos</small></div></div>
      <div class="col-6 col-md-3"><div class="card shadow-sm text-center p-3 border-0 rounded-3"><i class="bi bi-check-circle text-success fs-2"></i><h3 class="fw-bold mt-2" id="sA">-</h3><small class="text-muted">Asistentes</small></div></div>
      <div class="col-6 col-md-3"><div class="card shadow-sm text-center p-3 border-0 rounded-3"><i class="bi bi-bar-chart text-warning fs-2"></i><h3 class="fw-bold mt-2" id="sP">-</h3><small class="text-muted">% Asistencia</small></div></div>
      <div class="col-6 col-md-3"><div class="card shadow-sm text-center p-3 border-0 rounded-3"><i class="bi bi-door-open text-info fs-2"></i><h3 class="fw-bold mt-2" id="sC">-</h3><small class="text-muted">Capacidad Máx.</small></div></div>
    </div>
    <div class="card shadow-sm mb-4 p-4">
      <h6 class="fw-bold mb-3">Ocupación del Evento</h6>
      <div class="progress mb-2" style="height:24px;border-radius:12px"><div id="capBar" class="progress-bar fw-bold" style="border-radius:12px"></div></div>
      <div class="d-flex justify-content-between"><small id="capL" class="text-muted"></small><small id="attL" class="text-muted"></small></div>
    </div>
    <div class="row g-4 mb-4">
      <div class="col-md-6"><div class="card shadow-sm p-4"><h6 class="fw-bold mb-3"><i class="bi bi-graph-up me-2 text-primary"></i>Inscripciones por Día</h6><div class="chart-container"><canvas id="insChart"></canvas></div></div></div>
      <div class="col-md-6"><div class="card shadow-sm p-4"><h6 class="fw-bold mb-3"><i class="bi bi-clock me-2 text-success"></i>Asistencia por Hora</h6><div id="attChartWrap" class="chart-container"><canvas id="attChart"></canvas></div></div></div>
    </div>
    <div class="card shadow-sm">
      <div class="card-header fw-bold">Lista de Inscritos</div>
      <div class="card-body p-0">
        <div class="table-responsive"><table class="table table-hover mb-0">
          <thead class="table-light"><tr><th>#</th><th>Participante</th><th>Email</th><th>Inscrito</th><th>Asistencia</th></tr></thead>
          <tbody id="regTbl"></tbody>
        </table></div>
      </div>
    </div>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script>
const params=new URLSearchParams(location.search),eventId=params.get('id');
async function init(){
  const m=await fetch('/api/auth/me',{credentials:'include'});if(!m.ok){location.href='/login.html';return;}
  const u=await m.json();if(u.role==='PARTICIPANT'){location.href='/index.html';return;}
  if(!eventId){location.href='/dashboard.html';return;}
  const [sr,rr]=await Promise.all([fetch('/api/events/'+eventId+'/stats',{credentials:'include'}),fetch('/api/events/'+eventId+'/registrations',{credentials:'include'})]);
  if(!sr.ok){location.href='/dashboard.html';return;}
  const s=await sr.json(),regs=rr.ok?await rr.json():[];
  document.getElementById('loading').classList.add('d-none');document.getElementById('content').classList.remove('d-none');
  document.getElementById('evTitle').textContent=s.eventTitle;
  const d=new Date(s.eventDate);
  document.getElementById('evMeta').textContent='📅 '+d.toLocaleDateString('es-DO',{weekday:'long',day:'numeric',month:'long',year:'numeric'})+' | ID: '+s.eventId;
  document.getElementById('sR').textContent=s.totalRegistered;document.getElementById('sA').textContent=s.totalAttended;
  document.getElementById('sP').textContent=s.attendancePercentage+'%';document.getElementById('sC').textContent=s.maxCapacity;
  const occ=s.maxCapacity>0?Math.round(s.totalRegistered/s.maxCapacity*100):0;
  const bar=document.getElementById('capBar');bar.style.width=occ+'%';bar.textContent=occ+'%';
  bar.className='progress-bar fw-bold '+(occ>=90?'bg-danger':occ>=60?'bg-warning':'bg-success');
  document.getElementById('capL').textContent=s.totalRegistered+'/'+s.maxCapacity+' inscritos ('+occ+'% ocupación)';
  document.getElementById('attL').textContent=s.attendancePercentage+'% asistencia';
  new Chart(document.getElementById('insChart'),{type:'bar',data:{labels:Object.keys(s.inscriptionsByDay),datasets:[{label:'Inscripciones',data:Object.values(s.inscriptionsByDay),backgroundColor:'#1a237e',borderRadius:6}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{y:{beginAtZero:true,ticks:{stepSize:1}}}}});
  const ah=Object.keys(s.attendanceByHour);
  if(ah.length){new Chart(document.getElementById('attChart'),{type:'line',data:{labels:ah,datasets:[{label:'Asistencias',data:Object.values(s.attendanceByHour),borderColor:'#198754',backgroundColor:'rgba(25,135,84,.15)',fill:true,tension:0.4,pointRadius:5}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{y:{beginAtZero:true,ticks:{stepSize:1}}}}});}
  else{document.getElementById('attChartWrap').innerHTML='<div class="text-center text-muted py-5"><i class="bi bi-clock-history" style="font-size:3rem"></i><p class="mt-2">Sin datos de asistencia</p></div>';}
  document.getElementById('regTbl').innerHTML=regs.map((r,i)=>`<tr><td>${i+1}</td><td class="fw-semibold">${r.user.username}</td><td>${r.user.email}</td><td>${new Date(r.registeredAt).toLocaleDateString('es-DO')}</td><td>${r.attended?`<span class="badge bg-success"><i class="bi bi-check me-1"></i>Asistió ${r.attendedAt?'('+new Date(r.attendedAt).toLocaleTimeString('es-DO',{hour:'2-digit',minute:'2-digit'})+')':''}</span>`:'<span class="badge bg-warning text-dark">Pendiente</span>'}</td></tr>`).join('');
}
async function logout(){await fetch('/api/auth/logout',{method:'POST',credentials:'include'});location.href='/login.html';}
init();
</script>
</body></html>
