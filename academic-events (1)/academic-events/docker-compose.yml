version: '3.9'

services:
  app:
    image: tu-usuario/academic-events:latest
    build:
      context: .
      dockerfile: Dockerfile
    container_name: academic-events-app
    environment:
      - PORT=8080
      - DB_URL=jdbc:h2:tcp://localhost:9092/./data/academic_events
    volumes:
      - db_data:/app/data
    ports:
      - "8080:8080"
    restart: unless-stopped
    networks:
      - events-net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/index.html"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  nginx:
    image: nginx:alpine
    container_name: academic-events-nginx
    depends_on:
      - app
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    restart: unless-stopped
    networks:
      - events-net

volumes:
  db_data:

networks:
  events-net:
    driver: bridge
