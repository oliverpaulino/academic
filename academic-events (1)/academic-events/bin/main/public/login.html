<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login - Eventos Académicos</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet"/>
  <style>
    body{background:linear-gradient(135deg,#1a237e,#3949ab);min-height:100vh;display:flex;align-items:center;justify-content:center}
    .card{border:none;border-radius:16px;box-shadow:0 20px 60px rgba(0,0,0,.3)}
    .btn-primary{background:#1a237e;border-color:#1a237e}
    .btn-primary:hover{background:#283593;border-color:#283593}
  </style>
</head>
<body>
<div class="container">
  <div class="row justify-content-center">
    <div class="col-md-5">
      <div class="card p-5">
        <div class="text-center mb-4">
          <i class="bi bi-mortarboard-fill" style="font-size:2.5rem;color:#1a237e"></i>
          <h3 class="fw-bold mt-2">Eventos Académicos</h3>
          <p class="text-muted">Pontificia Universidad Católica</p>
        </div>
        <div id="alert" class="d-none alert"></div>
        <div class="mb-3">
          <label class="form-label fw-semibold">Usuario</label>
          <div class="input-group">
            <span class="input-group-text"><i class="bi bi-person"></i></span>
            <input type="text" id="username" class="form-control" placeholder="Nombre de usuario"/>
          </div>
        </div>
        <div class="mb-4">
          <label class="form-label fw-semibold">Contraseña</label>
          <div class="input-group">
            <span class="input-group-text"><i class="bi bi-lock"></i></span>
            <input type="password" id="password" class="form-control" placeholder="Contraseña"/>
            <button class="btn btn-outline-secondary" type="button" id="togglePwd"><i class="bi bi-eye"></i></button>
          </div>
        </div>
        <button class="btn btn-primary w-100 py-2 fw-bold" onclick="doLogin()">
          <span id="spin" class="spinner-border spinner-border-sm d-none me-2"></span>Iniciar Sesión
        </button>
        <hr class="my-4"/>
        <p class="text-center mb-0">¿No tienes cuenta? <a href="register.html" class="text-decoration-none fw-bold">Regístrate aquí</a></p>
      </div>
    </div>
  </div>
</div>
<script>
  document.getElementById('togglePwd').onclick = () => {
    const p = document.getElementById('password'), i = document.querySelector('#togglePwd i');
    p.type = p.type === 'password' ? 'text' : 'password';
    i.classList.toggle('bi-eye'); i.classList.toggle('bi-eye-slash');
  };
  document.querySelectorAll('input').forEach(i => i.addEventListener('keydown', e => { if(e.key==='Enter') doLogin(); }));
  async function doLogin() {
    const username = document.getElementById('username').value.trim();
    const password = document.getElementById('password').value;
    const a = document.getElementById('alert'); a.className = 'd-none alert';
    if (!username || !password) { a.className='alert alert-danger'; a.textContent='Completa todos los campos.'; return; }
    const btn = document.querySelector('button.btn-primary'); btn.disabled = true;
    document.getElementById('spin').classList.remove('d-none');
    try {
      const res = await fetch('/api/auth/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username,password}),credentials:'include'});
      const data = await res.json();
      if (res.ok) {
        if (data.role==='ADMIN') location.href='/admin.html';
        else if (data.role==='ORGANIZER') location.href='/dashboard.html';
        else location.href='/index.html';
      } else { a.className='alert alert-danger'; a.textContent=data.error||'Error al iniciar sesión'; }
    } catch(e) { a.className='alert alert-danger'; a.textContent='Error de conexión.'; }
    finally { btn.disabled=false; document.getElementById('spin').classList.add('d-none'); }
  }
</script>
</body></html>
