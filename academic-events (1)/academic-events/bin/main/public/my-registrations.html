<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Mis Inscripciones</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet"/>
  <style>
    :root{--primary:#1a237e}.navbar{background:var(--primary)!important}
    .reg-card{border-left:4px solid var(--primary);border-radius:8px}
    .qr-img{max-width:220px;border-radius:8px;border:3px solid #1a237e}
  </style>
</head>
<body class="bg-light">
<nav class="navbar navbar-dark px-4 py-3">
  <a class="navbar-brand fw-bold" href="/index.html"><i class="bi bi-mortarboard-fill me-2"></i>Eventos PUCMM</a>
  <div class="d-flex gap-2">
    <a href="/index.html" class="btn btn-outline-light btn-sm">Ver Eventos</a>
    <button class="btn btn-outline-light btn-sm" onclick="logout()">Salir</button>
  </div>
</nav>
<div class="container my-5">
  <h2 class="fw-bold mb-1"><i class="bi bi-card-checklist me-2 text-primary"></i>Mis Inscripciones</h2>
  <p class="text-muted">Eventos registrados y códigos QR de acceso</p>
  <div id="alert" class="d-none alert"></div>
  <div id="container"><div class="text-center py-5"><div class="spinner-border text-primary" style="width:3rem;height:3rem"></div></div></div>
</div>
<!-- QR Modal -->
<div class="modal fade" id="qrModal" tabindex="-1">
  <div class="modal-dialog modal-sm">
    <div class="modal-content rounded-4">
      <div class="modal-header text-white rounded-top-4" style="background:#1a237e">
        <h6 class="modal-title fw-bold">Código QR de Acceso</h6>
        <button class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body text-center p-4">
        <img id="qrImg" src="" alt="QR" class="qr-img mb-3"/>
        <p class="text-muted small" id="qrInfo"></p>
        <a id="qrDL" href="" download="qr-acceso.png" class="btn btn-primary btn-sm w-100"><i class="bi bi-download me-1"></i>Descargar QR</a>
      </div>
    </div>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
async function init(){
  const m=await fetch('/api/auth/me',{credentials:'include'});
  if(!m.ok){location.href='/login.html';return;}
  const r=await fetch('/api/my-registrations',{credentials:'include'});
  const regs=await r.json();
  const c=document.getElementById('container');
  if(!regs.length){c.innerHTML='<div class="text-center py-5 text-muted"><i class="bi bi-calendar-x" style="font-size:4rem"></i><p class="mt-3 fs-5">No estás inscrito en ningún evento.</p><a href="/index.html" class="btn btn-primary">Ver eventos</a></div>';return;}
  const now=new Date(),up=regs.filter(r=>new Date(r.event.dateTime)>=now),past=regs.filter(r=>new Date(r.event.dateTime)<now);
  let html='';
  if(up.length){html+='<h5 class="fw-bold mb-3 text-success"><i class="bi bi-calendar-check me-2"></i>Próximos</h5><div class="row g-3 mb-4">'+up.map(r=>rc(r,false)).join('')+'</div>';}
  if(past.length){html+='<h5 class="fw-bold mb-3 text-muted"><i class="bi bi-calendar2-check me-2"></i>Pasados</h5><div class="row g-3">'+past.map(r=>rc(r,true)).join('')+'</div>';}
  c.innerHTML=html;
}
function rc(r,isPast){
  const d=new Date(r.event.dateTime),sc={PUBLISHED:'success',DRAFT:'secondary',CANCELLED:'danger'},sl={PUBLISHED:'Publicado',DRAFT:'Borrador',CANCELLED:'Cancelado'};
  return `<div class="col-md-6"><div class="card reg-card shadow-sm"><div class="card-body">
    <div class="d-flex justify-content-between align-items-start mb-2">
      <h6 class="fw-bold mb-0">${esc(r.event.title)}</h6>
      <span class="badge bg-${sc[r.event.status]}">${sl[r.event.status]}</span>
    </div>
    <p class="text-muted small mb-1"><i class="bi bi-calendar me-1"></i>${d.toLocaleDateString('es-DO',{weekday:'short',day:'2-digit',month:'short',year:'numeric'})} - ${d.toLocaleTimeString('es-DO',{hour:'2-digit',minute:'2-digit'})}</p>
    <p class="text-muted small mb-2"><i class="bi bi-geo-alt me-1"></i>${esc(r.event.location)}</p>
    <p class="text-muted small mb-3"><i class="bi bi-clock-history me-1"></i>Inscrito: ${new Date(r.registeredAt).toLocaleDateString('es-DO')}</p>
    ${r.attended?'<span class="badge bg-success fs-6"><i class="bi bi-check-circle me-1"></i>Asistencia confirmada</span>':'<span class="badge bg-warning text-dark fs-6"><i class="bi bi-hourglass me-1"></i>Pendiente asistencia</span>'}
    <div class="mt-3 d-flex gap-2 flex-wrap">
      <button class="btn btn-outline-primary btn-sm" onclick="showQR('${r.token}','${esc(r.event.title)}')"><i class="bi bi-qr-code me-1"></i>Ver QR</button>
      ${!isPast&&r.event.status!=='CANCELLED'?`<button class="btn btn-outline-danger btn-sm" onclick="cancelReg(${r.event.id},this)"><i class="bi bi-x-circle me-1"></i>Cancelar</button>`:''}
    </div>
  </div></div></div>`;
}
async function showQR(token,title){
  const src='/api/registrations/'+token+'/qr';
  document.getElementById('qrImg').src=src;
  document.getElementById('qrInfo').textContent='Evento: '+title;
  document.getElementById('qrDL').href=src;
  new bootstrap.Modal(document.getElementById('qrModal')).show();
}
async function cancelReg(eventId,btn){
  if(!confirm('¿Cancelar tu inscripción?')) return;
  btn.disabled=true;
  const r=await fetch('/api/events/'+eventId+'/register',{method:'DELETE',credentials:'include'});
  const d=await r.json();
  if(r.ok){const a=document.getElementById('alert');a.className='alert alert-info';a.textContent='Inscripción cancelada.';setTimeout(()=>init(),500);}
  else{alert('❌ '+d.error);btn.disabled=false;}
}
async function logout(){await fetch('/api/auth/logout',{method:'POST',credentials:'include'});location.href='/login.html';}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
init();
</script>
</body></html>
