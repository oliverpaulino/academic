<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Panel de Administración</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet"/>
  <style>
    :root{--primary:#1a237e}
    .sidebar{background:var(--primary);min-height:100vh;width:250px;position:fixed;left:0;top:0;z-index:100}
    .main{margin-left:250px;padding:24px}
    .sidebar .nav-link{color:rgba(255,255,255,.8);border-radius:8px;padding:10px 16px}
    .sidebar .nav-link:hover,.sidebar .nav-link.active{background:rgba(255,255,255,.15);color:white}
    @media(max-width:768px){.sidebar{display:none}.main{margin-left:0}}
  </style>
</head>
<body class="bg-light">
<div class="sidebar d-flex flex-column p-3">
  <div class="text-white text-center py-3 mb-2">
    <i class="bi bi-mortarboard-fill" style="font-size:2rem"></i>
    <div class="fw-bold mt-1">Eventos PUCMM</div>
    <span class="badge bg-danger mt-1">ADMINISTRADOR</span>
  </div>
  <hr class="border-secondary">
  <ul class="nav flex-column gap-1">
    <li><a class="nav-link active" href="/admin.html"><i class="bi bi-shield-lock me-2"></i>Panel Admin</a></li>
    <li><a class="nav-link" href="/dashboard.html"><i class="bi bi-calendar-event me-2"></i>Eventos</a></li>
    <li><a class="nav-link" href="/index.html"><i class="bi bi-house me-2"></i>Ver Sitio</a></li>
    <li><a class="nav-link" href="/scan-qr.html"><i class="bi bi-qr-code-scan me-2"></i>Escanear QR</a></li>
  </ul>
  <div class="mt-auto"><button class="btn btn-outline-light btn-sm w-100" onclick="logout()"><i class="bi bi-box-arrow-right me-2"></i>Salir</button></div>
</div>
<div class="main">
  <h2 class="fw-bold mb-4"><i class="bi bi-shield-lock text-danger me-2"></i>Panel de Administración</h2>
  <div id="alert" class="d-none alert"></div>
  <div class="row g-3 mb-4" id="gStats"></div>
  <ul class="nav nav-tabs mb-4">
    <li class="nav-item"><a class="nav-link active" data-bs-toggle="tab" href="#usersTab"><i class="bi bi-people me-1"></i>Usuarios</a></li>
    <li class="nav-item"><a class="nav-link" data-bs-toggle="tab" href="#eventsTab"><i class="bi bi-calendar-event me-1"></i>Todos los Eventos</a></li>
  </ul>
  <div class="tab-content">
    <div class="tab-pane fade show active" id="usersTab">
      <div class="card shadow-sm">
        <div class="card-header fw-bold d-flex justify-content-between align-items-center">
          Gestión de Usuarios
          <input type="search" id="uSearch" class="form-control form-control-sm w-auto" placeholder="Buscar..."/>
        </div>
        <div class="card-body p-0">
          <div class="table-responsive"><table class="table table-hover mb-0">
            <thead class="table-light"><tr><th>Usuario</th><th>Email</th><th>Rol</th><th>Estado</th><th>Acciones</th></tr></thead>
            <tbody id="uTbl"><tr><td colspan="5" class="text-center py-4"><div class="spinner-border text-primary"></div></td></tr></tbody>
          </table></div>
        </div>
      </div>
    </div>
    <div class="tab-pane fade" id="eventsTab">
      <div class="card shadow-sm">
        <div class="card-header fw-bold">Todos los Eventos del Sistema</div>
        <div class="card-body p-0">
          <div class="table-responsive"><table class="table table-hover mb-0">
            <thead class="table-light"><tr><th>Título</th><th>Organizador</th><th>Fecha</th><th>Inscritos</th><th>Estado</th><th>Acciones</th></tr></thead>
            <tbody id="eTbl"><tr><td colspan="6" class="text-center py-4"><div class="spinner-border text-primary"></div></td></tr></tbody>
          </table></div>
        </div>
      </div>
    </div>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
let allUsers=[];
async function init(){
  const r=await fetch('/api/auth/me',{credentials:'include'});if(!r.ok){location.href='/login.html';return;}
  const u=await r.json();if(u.role!=='ADMIN'){location.href='/index.html';return;}
  loadUsers();loadEvents();
}
async function loadUsers(){
  const r=await fetch('/api/admin/users',{credentials:'include'});allUsers=await r.json();
  const total=allUsers.length,admins=allUsers.filter(u=>u.role==='ADMIN').length,org=allUsers.filter(u=>u.role==='ORGANIZER').length,blocked=allUsers.filter(u=>u.blocked).length;
  document.getElementById('gStats').innerHTML=`${sc('bi-people','Total Usuarios',total,'primary')}${sc('bi-shield-fill','Administradores',admins,'danger')}${sc('bi-briefcase','Organizadores',org,'warning')}${sc('bi-slash-circle','Bloqueados',blocked,'secondary')}`;
  renderUsers(allUsers);
  document.getElementById('uSearch').addEventListener('input',function(){const q=this.value.toLowerCase();renderUsers(allUsers.filter(u=>u.username.toLowerCase().includes(q)||u.email.toLowerCase().includes(q)));});
}
function renderUsers(users){
  document.getElementById('uTbl').innerHTML=users.map(u=>`<tr>
    <td><strong>${esc(u.username)}</strong></td><td>${esc(u.email)}</td>
    <td><select class="form-select form-select-sm w-auto" onchange="changeRole(${u.id},this.value)" ${!u.id||u.username==='admin'?'disabled':''}>
      <option value="PARTICIPANT" ${u.role==='PARTICIPANT'?'selected':''}>Participante</option>
      <option value="ORGANIZER" ${u.role==='ORGANIZER'?'selected':''}>Organizador</option>
      <option value="ADMIN" ${u.role==='ADMIN'?'selected':''}>Administrador</option>
    </select></td>
    <td>${u.blocked?'<span class="badge bg-danger">Bloqueado</span>':'<span class="badge bg-success">Activo</span>'}</td>
    <td>${u.username!=='admin'?`<button class="btn btn-sm ${u.blocked?'btn-outline-success':'btn-outline-warning'}" onclick="toggleBlock(${u.id},${u.blocked})">
      <i class="bi ${u.blocked?'bi-unlock':'bi-lock'}"></i> ${u.blocked?'Desbloquear':'Bloquear'}
    </button>`:'<span class="text-muted small">Sistema</span>'}</td>
  </tr>`).join('');
}
function sc(i,l,v,c){return `<div class="col-6 col-md-3"><div class="card text-center shadow-sm border-0"><div class="card-body"><i class="bi ${i} text-${c} fs-2"></i><h4 class="fw-bold mt-1">${v}</h4><small class="text-muted">${l}</small></div></div></div>`;}
async function toggleBlock(id,blocked){
  const action=blocked?'unblock':'block';
  const r=await fetch('/api/admin/users/'+id+'/'+action,{method:'PUT',credentials:'include'});
  if(r.ok){showA(`Usuario ${blocked?'desbloqueado':'bloqueado'}.`,'success');loadUsers();}
  else{const d=await r.json();showA(d.error||'Error','danger');}
}
async function changeRole(id,role){
  const r=await fetch('/api/admin/users/'+id+'/role',{method:'PUT',credentials:'include',headers:{'Content-Type':'application/json'},body:JSON.stringify({role})});
  if(r.ok){showA('Rol actualizado.','success');loadUsers();}
  else{const d=await r.json();showA(d.error||'Error','danger');}
}
async function loadEvents(){
  const r=await fetch('/api/admin/events',{credentials:'include'});const ev=await r.json();
  const sb={PUBLISHED:'success',DRAFT:'secondary',CANCELLED:'danger'},sl={PUBLISHED:'Publicado',DRAFT:'Borrador',CANCELLED:'Cancelado'};
  document.getElementById('eTbl').innerHTML=ev.map(e=>{const d=new Date(e.dateTime);return `<tr>
    <td class="fw-semibold">${esc(e.title)}</td><td>${esc(e.createdBy.username)}</td>
    <td>${d.toLocaleDateString('es-DO')} ${d.toLocaleTimeString('es-DO',{hour:'2-digit',minute:'2-digit'})}</td>
    <td>${e.registeredCount}/${e.maxCapacity}</td>
    <td><span class="badge bg-${sb[e.status]}">${sl[e.status]}</span></td>
    <td><div class="btn-group btn-group-sm">
      <a href="/event-stats.html?id=${e.id}" class="btn btn-outline-info" title="Stats"><i class="bi bi-bar-chart"></i></a>
      <button class="btn btn-outline-danger" onclick="delEvent(${e.id})" title="Eliminar"><i class="bi bi-trash"></i></button>
    </div></td>
  </tr>`}).join('');
}
async function delEvent(id){
  if(!confirm('¿Eliminar este evento? Acción permanente.')) return;
  const r=await fetch('/api/admin/events/'+id,{method:'DELETE',credentials:'include'});
  if(r.ok){showA('Evento eliminado.','success');loadEvents();}
  else{const d=await r.json();showA(d.error||'Error','danger');}
}
function showA(msg,type){const a=document.getElementById('alert');a.className=`alert alert-${type} alert-dismissible fade show`;a.innerHTML=msg+'<button type="button" class="btn-close" data-bs-dismiss="alert"></button>';}
async function logout(){await fetch('/api/auth/logout',{method:'POST',credentials:'include'});location.href='/login.html';}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
init();
</script>
</body></html>
