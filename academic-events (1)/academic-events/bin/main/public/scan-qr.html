<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Escanear QR - Asistencia</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet"/>
  <style>
    :root{--primary:#1a237e}.navbar{background:var(--primary)!important}
    #reader{width:100%;border-radius:12px;overflow:hidden}
    .result-ok{border-left:6px solid #198754}.result-err{border-left:6px solid #dc3545}
    .scan-area{max-width:500px;margin:0 auto}
  </style>
</head>
<body class="bg-light">
<nav class="navbar navbar-dark px-4 py-3">
  <a class="navbar-brand fw-bold" href="/dashboard.html"><i class="bi bi-mortarboard-fill me-2"></i>Eventos PUCMM</a>
  <div class="d-flex gap-2">
    <a href="/dashboard.html" class="btn btn-outline-light btn-sm">Dashboard</a>
    <button class="btn btn-outline-light btn-sm" onclick="logout()">Salir</button>
  </div>
</nav>
<div class="container my-5">
  <div class="text-center mb-4">
    <h2 class="fw-bold"><i class="bi bi-qr-code-scan text-primary me-2"></i>Control de Asistencia</h2>
    <p class="text-muted">Escanea el QR del participante para registrar su asistencia</p>
  </div>
  <div class="scan-area">
    <div class="card shadow-sm mb-4">
      <div class="card-body">
        <div class="d-flex gap-2 mb-3">
          <button id="startBtn" class="btn btn-primary flex-fill" onclick="startScan()"><i class="bi bi-camera me-2"></i>Iniciar Cámara</button>
          <button id="stopBtn" class="btn btn-secondary flex-fill d-none" onclick="stopScan()"><i class="bi bi-stop-circle me-2"></i>Detener</button>
        </div>
        <div id="reader"></div>
        <hr/>
        <label class="form-label fw-semibold">O ingresar contenido QR manualmente:</label>
        <div class="input-group">
          <input type="text" id="manual" class="form-control" placeholder="EVENT:1|USER:2|TOKEN:uuid..."/>
          <button class="btn btn-outline-primary" onclick="processManual()"><i class="bi bi-check-circle"></i></button>
        </div>
      </div>
    </div>
    <div id="resultArea" class="d-none mb-3">
      <div id="resultCard" class="card p-3 shadow-sm">
        <div class="d-flex align-items-center gap-3">
          <i id="rIcon" class="bi fs-1"></i>
          <div><h6 id="rTitle" class="fw-bold mb-1"></h6><p id="rBody" class="mb-0 text-muted small"></p></div>
        </div>
      </div>
    </div>
    <div class="card shadow-sm">
      <div class="card-header fw-bold"><i class="bi bi-list-check me-2"></i>Registro de hoy (<span id="cnt">0</span>)</div>
      <div class="card-body p-0">
        <div id="log" class="list-group list-group-flush" style="max-height:300px;overflow-y:auto">
          <div class="list-group-item text-center text-muted py-3">Sin registros</div>
        </div>
      </div>
    </div>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
<script>
let scanner=null,logItems=[];
async function init(){
  const r=await fetch('/api/auth/me',{credentials:'include'});
  if(!r.ok){location.href='/login.html';return;}
  const u=await r.json();
  if(u.role==='PARTICIPANT'){location.href='/index.html';return;}
}
function startScan(){
  scanner=new Html5Qrcode("reader");
  scanner.start({facingMode:"environment"},{fps:10,qrbox:{width:280,height:280}},onScan,()=>{})
    .then(()=>{document.getElementById('startBtn').classList.add('d-none');document.getElementById('stopBtn').classList.remove('d-none');})
    .catch(e=>showResult(false,'Error de cámara',e.toString()));
}
function stopScan(){
  if(scanner){scanner.stop().then(()=>{scanner=null;document.getElementById('startBtn').classList.remove('d-none');document.getElementById('stopBtn').classList.add('d-none');});}
}
async function onScan(content){stopScan();await process(content);}
async function processManual(){const v=document.getElementById('manual').value.trim();if(!v)return;await process(v);document.getElementById('manual').value='';}
async function process(content){
  try{
    const r=await fetch('/api/registrations/scan',{method:'POST',credentials:'include',headers:{'Content-Type':'application/json'},body:JSON.stringify({qrContent:content})});
    const d=await r.json();
    if(r.ok){const reg=d.registration;showResult(true,'✅ Asistencia Registrada',`Participante: ${reg.user.username} | ${reg.event.title}`);addLog(true,reg.user.username,reg.event.title);}
    else{showResult(false,'❌ Error',d.error||'QR inválido');addLog(false,'Desconocido',d.error||'QR inválido');}
  }catch(e){showResult(false,'❌ Error de conexión',e.toString());}
}
function showResult(ok,title,body){
  const a=document.getElementById('resultArea'),c=document.getElementById('resultCard'),i=document.getElementById('rIcon');
  a.classList.remove('d-none');c.className='card p-3 shadow-sm '+(ok?'result-ok':'result-err');
  i.className='bi fs-1 '+(ok?'bi-check-circle-fill text-success':'bi-x-circle-fill text-danger');
  document.getElementById('rTitle').textContent=title;document.getElementById('rBody').textContent=body;
  setTimeout(()=>a.classList.add('d-none'),6000);
}
function addLog(ok,user,event){
  const now=new Date().toLocaleTimeString('es-DO');logItems.unshift({ok,user,event,time:now});
  document.getElementById('cnt').textContent=logItems.length;
  document.getElementById('log').innerHTML=logItems.map(e=>`
    <div class="list-group-item d-flex align-items-center gap-2 py-2">
      <i class="bi ${e.ok?'bi-check-circle-fill text-success':'bi-x-circle-fill text-danger'}"></i>
      <div class="flex-grow-1"><div class="fw-semibold small">${e.user}</div><div class="text-muted" style="font-size:.75rem">${e.event}</div></div>
      <small class="text-muted">${e.time}</small>
    </div>`).join('');
}
async function logout(){await fetch('/api/auth/logout',{method:'POST',credentials:'include'});location.href='/login.html';}
init();
</script>
</body></html>
