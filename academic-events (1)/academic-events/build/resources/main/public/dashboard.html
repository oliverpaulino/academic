<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1.0" />
  <title>Dashboard Organizador</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet" />
  <style>
    :root {
      --primary: #1a237e
    }

    .sidebar {
      background: var(--primary);
      min-height: 100vh;
      width: 250px;
      position: fixed;
      left: 0;
      top: 0;
      z-index: 100
    }

    .main {
      margin-left: 250px;
      padding: 24px
    }

    .sidebar .nav-link {
      color: rgba(255, 255, 255, .8);
      border-radius: 8px;
      padding: 10px 16px
    }

    .sidebar .nav-link:hover,
    .sidebar .nav-link.active {
      background: rgba(255, 255, 255, .15);
      color: white
    }

    @media(max-width:768px) {
      .sidebar {
        display: none
      }

      .main {
        margin-left: 0
      }
    }
  </style>
</head>

<body class="bg-light">
  <div class="sidebar d-flex flex-column p-3">
    <div class="text-white text-center py-3 mb-2">
      <i class="bi bi-mortarboard-fill" style="font-size:2rem"></i>
      <div class="fw-bold mt-1">Eventos PUCMM</div>
      <small id="sUser" class="opacity-75"></small>
    </div>
    <hr class="border-secondary">
    <ul class="nav flex-column gap-1">
      <li><a class="nav-link active" href="/dashboard.html"><i class="bi bi-speedometer2 me-2"></i>Dashboard</a></li>
      <li><a class="nav-link" href="/index.html"><i class="bi bi-calendar-event me-2"></i>Ver Eventos</a></li>
      <li><a class="nav-link" href="/scan-qr.html"><i class="bi bi-qr-code-scan me-2"></i>Escanear QR</a></li>
      <li><a class="nav-link" href="/my-registrations.html"><i class="bi bi-card-checklist me-2"></i>Mis
          Inscripciones</a></li>
    </ul>
    <div class="mt-auto"><button class="btn btn-outline-light btn-sm w-100" onclick="logout()"><i
          class="bi bi-box-arrow-right me-2"></i>Cerrar Sesión</button></div>
  </div>
  <div class="main">
    <div class="d-flex justify-content-between align-items-center mb-4">
      <h2 class="fw-bold">Mis Eventos</h2>
      <button class="btn btn-primary" onclick="openCreate()"><i class="bi bi-plus-circle me-2"></i>Nuevo Evento</button>
    </div>
    <div id="alert" class="d-none alert"></div>
    <div class="row g-3 mb-4" id="stats"></div>
    <div class="card shadow-sm">
      <div class="card-header fw-bold">Lista de Eventos</div>
      <div class="card-body p-0">
        <div class="table-responsive">
          <table class="table table-hover mb-0">
            <thead class="table-light">
              <tr>
                <th>Título</th>
                <th>Fecha</th>
                <th>Lugar</th>
                <th>Inscritos</th>
                <th>Estado</th>
                <th>Acciones</th>
              </tr>
            </thead>
            <tbody id="tbl">
              <tr>
                <td colspan="6" class="text-center py-4">
                  <div class="spinner-border text-primary"></div>
                </td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>

  <!-- Form Modal -->
  <div class="modal fade" id="fModal" tabindex="-1">
    <div class="modal-dialog modal-lg">
      <div class="modal-content rounded-4">
        <div class="modal-header text-white rounded-top-4" style="background:#1a237e">
          <h5 class="modal-title fw-bold" id="fTitle">Nuevo Evento</h5>
          <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body p-4">
          <div class="row g-3">
            <div class="col-12"><label class="form-label fw-semibold">Título *</label><input type="text" id="f-title"
                class="form-control" maxlength="200" /></div>
            <div class="col-12"><label class="form-label fw-semibold">Descripción *</label><textarea id="f-desc"
                class="form-control" rows="3"></textarea></div>
            <div class="col-md-6"><label class="form-label fw-semibold">Fecha y Hora *</label><input
                type="datetime-local" id="f-dt" class="form-control" /></div>
            <div class="col-md-6"><label class="form-label fw-semibold">Cupo máximo *</label><input type="number"
                id="f-cap" class="form-control" min="1" value="50" /></div>
            <div class="col-12"><label class="form-label fw-semibold">Lugar *</label><input type="text" id="f-loc"
                class="form-control" maxlength="300" /></div>
          </div>
          <div id="fAlert" class="d-none alert mt-3"></div>
        </div>
        <div class="modal-footer">
          <button class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
          <button class="btn btn-primary" onclick="save()"><span id="fSpin"
              class="spinner-border spinner-border-sm d-none me-1"></span>Guardar</button>
        </div>
      </div>
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    let editId = null, cu = null;
    async function init() {
      const r = await fetch('/api/auth/me', { credentials: 'include' });
      if (!r.ok) { location.href = '/login.html'; return; }
      cu = await r.json();
      if (cu.role === 'PARTICIPANT') { location.href = '/index.html'; return; }
      document.getElementById('sUser').textContent = cu.username + ' · ' + cu.role;
      load();
    }
    async function load() {
      const ep = cu.role === 'ADMIN' ? '/api/admin/events' : '/api/my-events';
      const r = await fetch(ep, { credentials: 'include' });
      const ev = await r.json();
      const pub = ev.filter(e => e.status === 'PUBLISHED').length, total = ev.length;
      const totalR = ev.reduce((s, e) => s + e.registeredCount, 0);
      const totalC = ev.reduce((s, e) => s + e.maxCapacity, 0);
      document.getElementById('stats').innerHTML = `
    ${sc('bi-calendar-check', 'Total Eventos', total, 'primary')}${sc('bi-broadcast', 'Publicados', pub, 'success')}
    ${sc('bi-people', 'Total Inscritos', totalR, 'info')}${sc('bi-bar-chart', 'Ocupación', totalC > 0 ? Math.round(totalR / totalC * 100) + '%' : '0%', 'warning')}`;
      const sb = { PUBLISHED: 'success', DRAFT: 'secondary', CANCELLED: 'danger' }, sl = { PUBLISHED: 'Publicado', DRAFT: 'Borrador', CANCELLED: 'Cancelado' };
      document.getElementById('tbl').innerHTML = ev.length ? ev.map(e => {
        const d = new Date(e.dateTime);
        return `<tr><td class="fw-semibold">${esc(e.title)}</td><td>${d.toLocaleDateString('es-DO')} ${d.toLocaleTimeString('es-DO', { hour: '2-digit', minute: '2-digit' })}</td>
    <td>${esc(e.location)}</td><td><span class="badge bg-light text-dark">${e.registeredCount}/${e.maxCapacity}</span></td>
    <td><span class="badge bg-${sb[e.status]}">${sl[e.status]}</span></td>
    <td><div class="btn-group btn-group-sm">
      ${e.status === 'DRAFT' ? `<button class="btn btn-success" onclick="setS(${e.id},'publish')" title="Publicar"><i class="bi bi-broadcast"></i></button>` : ''}
      ${e.status === 'PUBLISHED' ? `<button class="btn btn-secondary" onclick="setS(${e.id},'unpublish')" title="Des-publicar"><i class="bi bi-pause"></i></button>` : ''}
      ${e.status !== 'CANCELLED' ? `<button class="btn btn-warning" onclick="openEdit(${e.id})" title="Editar"><i class="bi bi-pencil"></i></button>` : ''}
      ${e.status !== 'CANCELLED' ? `<button class="btn btn-danger" onclick="setS(${e.id},'cancel')" title="Cancelar"><i class="bi bi-x-circle"></i></button>` : ''}
      <a href="/event-stats.html?id=${e.id}" class="btn btn-info text-white" title="Stats"><i class="bi bi-bar-chart"></i></a>
      <a href="/scan-qr.html?eventId=${e.id}" class="btn btn-dark" title="QR"><i class="bi bi-qr-code-scan"></i></a>
    </div></td></tr>`;
      }).join('') : '<tr><td colspan="6" class="text-center py-5 text-muted">No tienes eventos aún.</td></tr>';
    }
    function sc(i, l, v, c) { return `<div class="col-6 col-md-3"><div class="card text-center shadow-sm border-0"><div class="card-body"><i class="bi ${i} text-${c} fs-2"></i><h4 class="fw-bold mt-1">${v}</h4><small class="text-muted">${l}</small></div></div></div>`; }
    function openCreate() { editId = null; document.getElementById('fTitle').textContent = 'Nuevo Evento';['f-title', 'f-desc', 'f-loc'].forEach(id => document.getElementById(id).value = ''); document.getElementById('f-cap').value = 50; document.getElementById('f-dt').value = ''; document.getElementById('fAlert').className = 'd-none alert'; new bootstrap.Modal(document.getElementById('fModal')).show(); }
    async function openEdit(id) {
      editId = id;
      const r = await fetch('/api/events/' + id, { credentials: 'include' }); const e = await r.json();
      document.getElementById('fTitle').textContent = 'Editar Evento';
      document.getElementById('f-title').value = e.title; document.getElementById('f-desc').value = e.description;
      document.getElementById('f-loc').value = e.location; document.getElementById('f-cap').value = e.maxCapacity;
      document.getElementById('f-dt').value = e.dateTime.substring(0, 16);
      document.getElementById('fAlert').className = 'd-none alert';
      new bootstrap.Modal(document.getElementById('fModal')).show();
    }
    async function save() {
      const title = document.getElementById('f-title').value.trim(), desc = document.getElementById('f-desc').value.trim(),
        dt = document.getElementById('f-dt').value, loc = document.getElementById('f-loc').value.trim(),
        cap = parseInt(document.getElementById('f-cap').value, 10);
      const fa = document.getElementById('fAlert');
      if (!title || !desc || !dt || !loc || Number.isNaN(cap)) { fa.className = 'alert alert-danger'; fa.textContent = 'Completa todos los campos.'; return; }
      if (cap < 1) { fa.className = 'alert alert-danger'; fa.textContent = 'El cupo máximo debe ser mayor o igual a 1.'; return; }
      document.getElementById('fSpin').classList.remove('d-none');
      const res = await fetch(editId ? '/api/events/' + editId : '/api/events', { method: editId ? 'PUT' : 'POST', credentials: 'include', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ title, description: desc, dateTime: dt, location: loc, maxCapacity: cap }) });
      document.getElementById('fSpin').classList.add('d-none');
      if (res.ok) { bootstrap.Modal.getInstance(document.getElementById('fModal')).hide(); showA(editId ? 'Evento actualizado.' : 'Evento creado.', 'success'); load(); }
      else { const d = await res.json(); fa.className = 'alert alert-danger'; fa.textContent = d.error || 'Error'; }
    }
    async function setS(id, action) {
      const msg = { publish: '¿Publicar?', unpublish: '¿Des-publicar?', cancel: '¿Cancelar este evento?' };
      if (!confirm(msg[action])) return;
      const r = await fetch('/api/events/' + id + '/' + action, { method: 'POST', credentials: 'include' });
      if (r.ok) { showA('Estado actualizado.', 'success'); load(); }
      else { const d = await r.json(); showA(d.error || 'Error', 'danger'); }
    }
    function showA(msg, type) { const a = document.getElementById('alert'); a.className = `alert alert-${type} alert-dismissible fade show`; a.innerHTML = msg + '<button type="button" class="btn-close" data-bs-dismiss="alert"></button>'; }
    async function logout() { await fetch('/api/auth/logout', { method: 'POST', credentials: 'include' }); location.href = '/login.html'; }
    function esc(s) { return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;'); }
    init();
  </script>
</body>

</html>
